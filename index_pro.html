<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messi vs Ronaldo PRO</title>
<style>
body{background:#0a0a0a;color:white;text-align:center;font-family:Arial,sans-serif}
h1{color:gold}
.track{width:95%;margin:15px auto;height:70px;border:2px solid white;position:relative;overflow:hidden}
.label{position:absolute;left:10px;top:5px;font-size:14px}
.ball{position:absolute;left:10px;top:25px;font-size:35px;cursor:pointer;transition:.25s}
#winner{color:gold}
table{margin:20px auto;border-collapse:collapse;width:320px}
th,td{border:1px solid #fff;padding:8px}
th{background:#222}
button{padding:10px 20px;margin:10px;font-size:16px}
</style>
</head>
<body>

<h1>🔥 Messi vs Ronaldo PRO ⚽</h1>

<div class="track"><div class="label">🇦🇷 Messi</div><div class="ball" onclick="move(0)" id="b1">⚽</div></div>
<div class="track"><div class="label">🇵🇹 Ronaldo</div><div class="ball" onclick="move(1)" id="b2">⚽</div></div>
<div class="track"><div class="label">🇧🇷 Brazil</div><div class="ball" onclick="move(2)" id="b3">⚽</div></div>
<div class="track"><div class="label">🇫🇷 France</div><div class="ball" onclick="move(3)" id="b4">⚽</div></div>
<div class="track"><div class="label">🇪🇸 Spain</div><div class="ball" onclick="move(4)" id="b5">⚽</div></div>

<h2 id="winner"></h2>
<button onclick="resetGame()">🔄 Reset Race</button>

<h2>🏆 Leaderboard</h2>
<table>
<thead><tr><th>Player</th><th>Wins</th></tr></thead>
<tbody id="leaderboard"></tbody>
</table>

<script>
const names=["Messi","Ronaldo","Brazil","France","Spain"];
let pos=[10,10,10,10,10];
let gameOver=false;

let wins=JSON.parse(localStorage.getItem("wins")) || {
  Messi:0,Ronaldo:0,Brazil:0,France:0,Spain:0
};

updateBoard();

function move(i){
 if(gameOver) return;

 pos[i]+=Math.floor(Math.random()*35)+25;
 document.getElementById("b"+(i+1)).style.left=pos[i]+"px";

 const trackWidth=document.querySelector(".track").clientWidth;

 if(pos[i]>=trackWidth-60){
   gameOver=true;
   const winner=names[i];

   wins[winner]++;
   localStorage.setItem("wins",JSON.stringify(wins));

   document.getElementById("winner").innerHTML="🏆 Winner: <b>"+winner+"</b>";
   updateBoard();

   setTimeout(resetGame,2500);
 }
}

function resetGame(){
 pos=[10,10,10,10,10];
 gameOver=false;
 document.getElementById("winner").innerHTML="";
 for(let i=0;i<5;i++){
   document.getElementById("b"+(i+1)).style.left="10px";
 }
}

function updateBoard(){
 const body=document.getElementById("leaderboard");

 const sorted=Object.entries(wins)
     .sort((a,b)=>b[1]-a[1]);

 body.innerHTML=sorted.map(
   x=>`<tr><td>${x[0]}</td><td>${x[1]}</td></tr>`
 ).join("");
}
</script>

</body>
</html>
